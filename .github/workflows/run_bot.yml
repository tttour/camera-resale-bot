name: Camera Resale Bot

on:
  schedule:
    # 6時間ごとに実行 (UTC時間の 0, 6, 12, 18時 -> 日本時間 9, 15, 21, 3時)
    - cron: '0 */6 * * *'
  workflow_dispatch: # 手動実行ボタンも追加

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium
        playwright install-deps chromium

    - name: Run Bot
      env:
        # GitHubのSecretsから読み込む設定
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
        RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
      run: |
        python main.py

    - name: Keep repository active (prevent workflow auto-disable)
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        echo "Last run: $(date '+%Y-%m-%d %H:%M:%S UTC')" > last_run.txt
        git add last_run.txt
        git diff --staged --quiet || git commit -m "chore: keep-alive [skip ci]"
        git push
